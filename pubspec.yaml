name: auremind_offline
description: A secure, offline-first notes and task management application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Database & File System
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # Stable version to prevent API 34/36 Gradle crashes
  file_picker: ^8.1.4 
  
  # Security
  encrypt: ^5.0.3
  
  # UI & Formatting
  table_calendar: ^3.1.2
  intl: ^0.19.0
  
  # Notifications & Time
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # App Icon Generator
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.5.0

# Configuration for changing the App Icon
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/Auremind_Icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  # Uncomment this block if you want to use custom images inside the app later
  # assets:
  #   - assets/images/