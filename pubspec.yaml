name: auremind_offline
description: "A secure, offline notes and task management app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.12.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Database, Security & Files
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.3
  encrypt: ^5.0.3
  
  # Attachments
  file_picker: ^8.0.3
  
  # Notifications & Time
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3
  
  # UI & Calendar
  table_calendar: ^3.1.1
  intl: ^0.19.0
  
  # State Management & Theming
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  dynamic_color: ^1.6.9
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/